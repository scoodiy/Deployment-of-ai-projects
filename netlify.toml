[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_API_BASE_URL = ""

[[redirects]]
  from = "/api/*"
  to = "http://103.236.96.84/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "http://103.236.96.84/health"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
