version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: quantbot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantbot
      POSTGRES_USER: quantbot
      POSTGRES_PASSWORD: quantbot123
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantbot -d quantbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantbot-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://quantbot:quantbot123@db:5432/quantbot
      SECRET_KEY: b2a8035045766514ac01dd8930a16c62d9c4365875f7198582cbac351d1b22e0
      CORS_ORIGINS: '["http://localhost:5173","https://ayuu.fun","https://comforting-peony-4504bd.netlify.app"]'
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  postgres_data:
