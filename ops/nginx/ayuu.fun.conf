# /etc/nginx/sites-available/ayuu.fun
# Nginx config for ayuu.fun Next.js blog
# Symlink: ln -sf /opt/xhblogs/ops/nginx/ayuu.fun.conf /etc/nginx/sites-enabled/ayuu.fun
# Reload:  nginx -t && systemctl reload nginx

server {
    server_name ayuu.fun www.ayuu.fun;

    # 文件上传限制
    client_max_body_size 50m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # 静态资源缓存 (Next.js _next/static 带 hash)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 上传文件缓存
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 所有请求走 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SSL (Certbot managed)
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/ayuu.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ayuu.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP -> HTTPS 重定向
server {
    if ($host = www.ayuu.fun) {
        return 301 https://$host$request_uri;
    }
    if ($host = ayuu.fun) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name ayuu.fun www.ayuu.fun;
    client_max_body_size 50m;
    return 404;
}
