apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      containers:
        - name: risk-engine
          image: quant-bot/risk-engine:latest
          env:
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
