apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strategy-engine
  template:
    metadata:
      labels:
        app: strategy-engine
    spec:
      containers:
        - name: strategy-engine
          image: quant-bot/strategy-engine:latest
          env:
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
