<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Curtain reveal animation - optimized for production">
  <title>Curtain Reveal</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .skip-hint {
      position: fixed;
      bottom: 30px;
      bottom: calc(30px + env(safe-area-inset-bottom));
      left: 50%;
      z-index: 300;
      color: rgba(245, 245, 240, 0.4);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      pointer-events: none;
      opacity: 0;
      transform: translateX(-50%);
      animation: hint-fade 0.6s 1.2s ease forwards;
      white-space: nowrap;
    }

    @keyframes hint-fade {
      to { opacity: 1; }
    }

    .skip-hint.hidden {
      opacity: 0 !important;
      transition: opacity 0.3s;
    }

    .curtain-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      cursor: pointer;
    }

    .curtain-left,
    .curtain-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: #1a1a1a;
      will-change: transform;
    }

    .curtain-left::before,
    .curtain-right::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .curtain-left { left: 0; }
    .curtain-right { right: 0; }

    .curtain-left.open {
      animation: open-left 0.8s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }

    .curtain-right.open {
      animation: open-right 0.8s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }

    @keyframes open-left {
      to { transform: translateX(-100%); }
    }

    @keyframes open-right {
      to { transform: translateX(100%); }
    }

    .line-container {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .dot {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f5f5f0;
      opacity: 0;
      transform: scale(0);
      will-change: transform, opacity;
    }

    .dot.animate {
      animation: dot-sequence 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes dot-sequence {
      0% { opacity: 0; transform: scale(0); }
      40% { opacity: 1; transform: scale(1); }
      80% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }

    .line {
      position: absolute;
      width: 100vw;
      height: 2px;
      background: #f5f5f0;
      opacity: 0;
      transform: scaleX(0);
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .line.expand {
      animation: line-expand 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes line-expand {
      0% { opacity: 1; transform: scaleX(0); }
      100% { opacity: 1; transform: scaleX(1); }
    }

    .line.pulse {
      opacity: 1;
      transform: scaleX(1);
      animation: line-pulse 0.35s ease-in-out forwards;
    }

    @keyframes line-pulse {
      0% { transform: scaleX(1) scaleY(1); box-shadow: none; }
      50% { transform: scaleX(1) scaleY(2); box-shadow: 0 0 12px rgba(245, 245, 240, 0.3); }
      100% { transform: scaleX(1) scaleY(1); box-shadow: none; }
    }

    .line.rotate {
      opacity: 1;
      transform: scaleX(1);
      animation: line-rotate 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes line-rotate {
      0% { transform: scaleX(1) rotate(0deg); opacity: 1; }
      75% { transform: scaleX(1) rotate(90deg); opacity: 1; }
      100% { transform: scaleX(1) rotate(90deg); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .curtain-overlay, .line-container, .skip-hint { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="skip-hint" id="skipHint">点击任意位置跳过</div>

  <div class="curtain-overlay" id="curtainOverlay">
    <div class="curtain-left" id="curtainLeft"></div>
    <div class="curtain-right" id="curtainRight"></div>
  </div>

  <div class="line-container" id="lineContainer">
    <div class="dot" id="dot"></div>
    <div class="line" id="line"></div>
  </div>

  <script>
    const dot = document.getElementById('dot');
    const line = document.getElementById('line');
    const curtainLeft = document.getElementById('curtainLeft');
    const curtainRight = document.getElementById('curtainRight');
    const curtainOverlay = document.getElementById('curtainOverlay');
    const lineContainer = document.getElementById('lineContainer');
    const skipHint = document.getElementById('skipHint');

    let finished = false;

    function notifyCurtainOpening() {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'curtain-opening' }, window.location.origin);
        }
      } catch {}
    }

    function finishCurtain() {
      if (finished) return;
      finished = true;
      try {
        sessionStorage.setItem('curtain-played', '1');
        if (window.parent && window.parent !== window) {
          window.parent.sessionStorage.setItem('curtain-played', '1');
        }
      } catch {}
    }

    if (sessionStorage.getItem('curtain-played')) {
      finishCurtain();
    } else if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      notifyCurtainOpening();
      setTimeout(finishCurtain, 50);
    } else {
      runAnimation();
    }

    document.addEventListener('click', skip);
    document.addEventListener('touchstart', skip);

    function skip() {
      if (finished) return;
      notifyCurtainOpening();
      skipHint.classList.add('hidden');
      lineContainer.style.display = 'none';
      curtainLeft.style.transition = 'transform 0.4s cubic-bezier(0.76, 0, 0.24, 1)';
      curtainRight.style.transition = 'transform 0.4s cubic-bezier(0.76, 0, 0.24, 1)';
      curtainLeft.style.transform = 'translateX(-100%)';
      curtainRight.style.transform = 'translateX(100%)';
      setTimeout(finishCurtain, 420);
    }

    function runAnimation() {
      setTimeout(() => {
        if (finished) return;
        dot.classList.add('animate');

        dot.addEventListener('animationend', () => {
          if (finished) return;
          line.classList.add('expand');

          line.addEventListener('animationend', function onExpand() {
            line.removeEventListener('animationend', onExpand);
            if (finished) return;
            line.classList.remove('expand');
            line.classList.add('pulse');

            line.addEventListener('animationend', function onPulse() {
              line.removeEventListener('animationend', onPulse);
              if (finished) return;
              line.classList.remove('pulse');
              line.classList.add('rotate');

              line.addEventListener('animationend', function onRotate() {
                line.removeEventListener('animationend', onRotate);
                if (finished) return;
                notifyCurtainOpening();
                curtainLeft.classList.add('open');
                curtainRight.classList.add('open');
                skipHint.classList.add('hidden');
                curtainLeft.addEventListener('animationend', finishCurtain, { once: true });
              });
            });
          });
        }, { once: true });
      }, 200);
    }
  </script>
</body>
</html>
